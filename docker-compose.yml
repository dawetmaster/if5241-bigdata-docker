# version: "3.8"

services:

  # === HDFS ===
  namenode:
    image: openeuler/hadoop:latest
    container_name: namenode
    hostname: namenode
    command:
      - bash
      - -c
      - |
        # Format hanya jika belum pernah di-format (tidak ada fsimage)
        if [ ! -d /tmp/hadoop-data/namenode/current ]; then
          hdfs namenode -format -nonInteractive -force
        fi
        hdfs namenode
    ports:
      - "9870:9870"  # Web UI
      - "9000:9000"  # HDFS IPC — untuk client (hdfs dfs, Spark, dsb)
    environment:
      CLUSTER_NAME: local-cluster
      # HADOOP_CONF_DIR agar Hadoop baca config dari volume yang kita mount
      HADOOP_CONF_DIR: /etc/hadoop-custom
    volumes:
      - hadoop_namenode:/tmp/hadoop-data/namenode
      - ./hadoop-config:/etc/hadoop-custom:ro  # core-site.xml & hdfs-site.xml
      - ./hadoop:/home/hadoop                  # staging area: host → HDFS

  datanode:
    image: openeuler/hadoop:latest
    container_name: datanode
    hostname: datanode
    command: ["hdfs", "datanode"]
    depends_on: [namenode]
    environment:
      HADOOP_CONF_DIR: /etc/hadoop-custom
    volumes:
      - hadoop_datanode:/tmp/hadoop-data/datanode
      - ./hadoop-config:/etc/hadoop-custom:ro  # harus config yang SAMA dengan namenode
      - ./hadoop:/home/hadoop

  # === KAFKA (KRaft, no ZooKeeper) ===
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"    # EXTERNAL — dari host
      - "29092:29092"  # INTERNAL — antar container
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on: [kafka]

  # === SPARK ===
  spark-master:
    image: apache/spark:3.5.1-scala2.12-java17-python3-r-ubuntu
    container_name: spark-master
    user: root
    command: ["/opt/spark/sbin/start-master.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8081:8080"
      - "7077:7077"

  spark-worker:
    image: apache/spark:3.5.1-scala2.12-java17-python3-r-ubuntu
    container_name: spark-worker
    user: root
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    depends_on: [spark-master]

  # === JUPYTER ===
  # Build dari Dockerfile.jupyter — dependencies di-install saat build, bukan saat start.
  # Base image di Dockerfile.jupyter WAJIB identik dengan spark-master/spark-worker
  # agar serialVersionUID Spark tidak clash (InvalidClassException).
  #
  # Cara rebuild setelah update requirements.jupyter.txt:
  #   docker compose build jupyter
  #   docker compose up -d jupyter
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
      args:
        SPARK_IMAGE: apache/spark:3.5.1-scala2.12-java17-python3-r-ubuntu
    image: local/jupyter-spark:3.5.1   # tag lokal agar tidak confuse dengan image upstream
    container_name: jupyter
    user: root
    ports:
      - "8888:8888"
    environment:
      SPARK_MASTER: spark://spark-master:7077
    volumes:
      - ./notebooks:/home/notebooks
    depends_on: [spark-master]



  # === HIVE ===
  # Terdiri dari tiga service:
  #   1. hive-postgres   — PostgreSQL sebagai metastore database (persist metadata tabel/schema)
  #   2. hive-metastore  — Thrift server yang menyimpan dan melayani metadata
  #   3. hive-server2    — JDBC endpoint untuk query HiveQL (Beeline, Spark, BI tools)
  #
  # Versi: apache/hive:4.0.1 — kompatibel dengan Hadoop 3.4.1 + Java 17

  hive-postgres:
    image: postgres:16-alpine
    container_name: hive-postgres
    hostname: hive-postgres
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5432:5432"
    volumes:
      - hive_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: apache/hive:4.0.1
    container_name: hive-metastore
    hostname: hive-metastore
    depends_on:
      hive-postgres:
        condition: service_healthy
      namenode:
        condition: service_started
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      # Inject JDBC driver PostgreSQL ke classpath Hive
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    ports:
      - "9083:9083"   # Thrift Metastore — dipakai Spark: spark.hive.metastore.uris
    volumes:
      - ./hadoop-config/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./hadoop-config/core-site.xml:/opt/hive/conf/core-site.xml:ro
      - ./hadoop-config/hdfs-site.xml:/opt/hive/conf/hdfs-site.xml:ro

  hive-server2:
    image: apache/hive:4.0.1
    container_name: hive-server2
    hostname: hive-server2
    depends_on:
      hive-metastore:
        condition: service_started
    environment:
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    ports:
      - "10000:10000"  # JDBC/Beeline: jdbc:hive2://localhost:10000
      - "10002:10002"  # HiveServer2 Web UI
    volumes:
      - ./hadoop-config/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./hadoop-config/core-site.xml:/opt/hive/conf/core-site.xml:ro
      - ./hadoop-config/hdfs-site.xml:/opt/hive/conf/hdfs-site.xml:ro

  # === NEO4J ===
  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/IF5241-bigdata
    volumes:
      - neo4j_data:/data

volumes:
  hive_postgres_data:   # metadata PostgreSQL untuk Hive Metastore
  hadoop_namenode:   # metadata namenode (fsimage, edits) — JANGAN dihapus sembarangan
  hadoop_datanode:   # blok data datanode
  neo4j_data: