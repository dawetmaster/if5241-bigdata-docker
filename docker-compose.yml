# version: "3.8"

services:

  # === HDFS ===
  namenode:
    image: openeuler/hadoop:latest
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"  # Web UI
      - "9000:9000"  # HDFS IPC — untuk client (hdfs dfs, Spark, dsb)
    environment:
      CLUSTER_NAME: local-cluster
    volumes:
      - hadoop_namenode:/tmp/hadoop-data/namenode
      - ./hadoop-config/core-site.xml:/usr/local/hadoop/etc/hadoop/core-site.xml:ro
      - ./hadoop-config/hdfs-site.xml:/usr/local/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./hadoop:/home/hadoop                  # staging area: host → HDFS

  datanode:
    image: openeuler/hadoop:latest
    container_name: datanode
    hostname: datanode
    depends_on: [namenode]
    volumes:
      - hadoop_datanode:/tmp/hadoop-data/datanode
      - ./hadoop-config/core-site.xml:/usr/local/hadoop/etc/hadoop/core-site.xml:ro
      - ./hadoop-config/hdfs-site.xml:/usr/local/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./hadoop:/home/hadoop

  # === KAFKA (KRaft, no ZooKeeper) ===
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"    # EXTERNAL — dari host
      - "29092:29092"  # INTERNAL — antar container
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on: [kafka]
  spark-master:
    image: apache/spark:3.5.8-scala2.12-java17-python3-r-ubuntu
    user: root
    command: ["/opt/spark/sbin/start-master.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8081:8080"
      - "7077:7077"

  spark-worker:
    image: apache/spark:3.5.8-scala2.12-java17-python3-r-ubuntu
    user: root
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    depends_on: [spark-master]
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
      args:
        SPARK_IMAGE: apache/spark:3.5.8-scala2.12-java17-python3-r-ubuntu
    image: local/jupyter-spark:3.5.8   # tag lokal agar tidak confuse dengan image upstream
    user: root
    ports:
      - "8888:8888"
    environment:
      SPARK_MASTER: spark://spark-master:7077
    volumes:
      - ./notebooks:/home/notebooks
    depends_on: [spark-master]
  hive-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: "example"
    volumes:
      - pgsql_data:/var/lib/postgresql
  hive-metastore:
    image: apache/hive:4.2.0
    depends_on:
      - hive-postgres
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-postgres:5432/postgres
        -Djavax.jdo.option.ConnectionUserName=postgres
        -Djavax.jdo.option.ConnectionPassword=example
    ports:
      - 9083:9083
    volumes:
      - ./hive-lib/postgres.jar:/opt/hive/lib/postgres.jar
  hive-server2:
    image: apache/hive:4.2.0
    depends_on:
      - hive-metastore
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: true
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-postgres:5432/postgres
        -Djavax.jdo.option.ConnectionUserName=postgres
        -Djavax.jdo.option.ConnectionPassword=example
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    ports:
      - 10000:10000
      - 10002:10002
    volumes:
      - ./hive-lib/postgres.jar:/opt/hive/lib/postgres.jar
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/IF5241-bigdata
    volumes:
      - neo4j_data:/data

volumes:
  hadoop_namenode:
  hadoop_datanode:
  pgsql_data:
  neo4j_data: